<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="login_title">Sign In</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: { colors: { brand: { 500: '#22c55e', 600: '#16a34a' } } }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 dark:bg-gray-900 flex items-center justify-center min-h-screen transition-colors duration-200">
    
    <!-- Top Right Controls -->
    <div class="absolute top-4 right-4 flex space-x-4">
        <select id="lang-select" class="bg-white dark:bg-gray-800 text-sm border rounded-lg p-2 dark:text-white dark:border-gray-700">
            <option value="en">EN</option>
            <option value="th">TH</option>
        </select>
        <button id="theme-toggle" class="p-2 bg-white dark:bg-gray-800 rounded-lg dark:text-white border dark:border-gray-700">
            <i class="fa-solid fa-moon dark:hidden"></i>
            <i class="fa-solid fa-sun hidden dark:block text-yellow-400"></i>
        </button>
    </div>

    <!-- Login Card -->
    <div class="bg-white dark:bg-gray-800 p-8 rounded-2xl shadow-lg w-full max-w-md border border-gray-100 dark:border-gray-700">
        <div class="text-center mb-8">
            <i class="fa-solid fa-leaf text-brand-500 text-4xl mb-3"></i>
            <h2 class="text-2xl font-bold text-gray-900 dark:text-white" data-i18n="login_title">Sign In</h2>
            <p class="text-gray-500 dark:text-gray-400 text-sm mt-1" data-i18n="login_subtitle">Access the Garden Shop System</p>
        </div>

        <form id="login-form" class="space-y-5">
            <div id="error-message" class="hidden bg-red-100 text-red-700 p-3 rounded-lg text-sm text-center" data-i18n="login_error"></div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1" data-i18n="username_label">Username</label>
                <input type="text" id="username" required class="w-full p-3 bg-gray-50 dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-brand-500 dark:text-white outline-none transition-shadow">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1" data-i18n="password_label">Password</label>
                <input type="password" id="password" required class="w-full p-3 bg-gray-50 dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-brand-500 dark:text-white outline-none transition-shadow">
            </div>

            <button type="submit" class="w-full bg-brand-500 hover:bg-brand-600 text-white font-bold py-3 px-4 rounded-lg transition-colors flex justify-center items-center">
                <span id="btn-text" data-i18n="login_button">Sign In</span>
                <i id="btn-spinner" class="fa-solid fa-circle-notch fa-spin hidden ml-2"></i>
            </button>
        </form>
    </div>

    <script src="/js/app.js"></script> <!-- Load i18n and theme logic -->
    <script src="/js/auth.js"></script>
</body>
</html>
