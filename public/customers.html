<div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
    <div class="bg-gradient-to-r from-green-500 to-green-600 p-6 rounded-2xl text-white">
        <p class="opacity-80">Total Members</p>
        <h3 id="total-members" class="text-3xl font-bold">1,240</h3>
    </div>
    <!-- More Stats Cards -->
</div>

<div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border dark:border-gray-700">
    <div class="p-4 border-b dark:border-gray-700 flex justify-between">
        <input type="text" id="member-search" placeholder="Search by Phone or Name..." 
               class="p-2 border rounded-lg w-1/3 dark:bg-gray-700 dark:border-gray-600">
        <button class="bg-brand-500 text-white px-4 py-2 rounded-lg" onclick="openAddCustomerModal()">+ Add Member</button>
    </div>
    <table class="w-full text-left">
        <thead>
            <tr class="text-gray-400 text-sm border-b dark:border-gray-700">
                <th class="p-4">Customer</th>
                <th class="p-4">Tier</th>
                <th class="p-4">Points</th>
                <th class="p-4">Last Visit</th>
            </tr>
        </thead>
        <tbody id="customer-list">
            <!-- Rows generated by JS -->
        </tbody>
    </table>
</div>
