<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="app_title">Garden Shop System</title>
    <script src="/js/guard.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: { 50: '#f0fdf4', 500: '#22c55e', 900: '#14532d' }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-gray-900 dark:text-gray-100 transition-colors duration-200 flex h-screen overflow-hidden">

    <!-- Sidebar -->
    <aside class="w-64 bg-white dark:bg-gray-800 border-r border-gray-200 dark:border-gray-700 flex flex-col hidden md:flex">

        <!-- Logo -->
        <div class="h-16 flex items-center px-6 border-b border-gray-200 dark:border-gray-700">
            <i class="fa-solid fa-leaf text-brand-500 text-xl mr-3"></i>
            <span class="font-bold text-lg tracking-wide">Garden Shop</span>
        </div>

        <!-- Nav Links -->
        <nav class="flex-1 px-4 py-4 space-y-1 overflow-y-auto">

            <!-- Dashboard -->
            <a href="/index.html"
               class="nav-link flex items-center gap-3 px-4 py-3 rounded-lg transition-colors
                      text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700">
                <i class="fa-solid fa-chart-pie w-5 text-center"></i>
                <span data-i18n="dashboard">Dashboard</span>
            </a>

            <!-- POS -->
            <a href="/pos.html"
               class="nav-link flex items-center gap-3 px-4 py-3 rounded-lg transition-colors
                      text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700">
                <i class="fa-solid fa-cash-register w-5 text-center"></i>
                <span data-i18n="pos">POS</span>
            </a>

            <!-- Products -->
            <a href="/products.html"
               class="nav-link flex items-center gap-3 px-4 py-3 rounded-lg transition-colors
                      text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700">
                <i class="fa-solid fa-box w-5 text-center"></i>
                <span data-i18n="products">Products</span>
            </a>

            <!-- Inventory -->
            <a href="/inventory.html"
               class="nav-link flex items-center gap-3 px-4 py-3 rounded-lg transition-colors
                      text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700">
                <i class="fa-solid fa-warehouse w-5 text-center"></i>
                <span data-i18n="inventory">Inventory</span>
            </a>

            <!-- Purchase Orders -->
            <a href="/purchase-orders.html"
               class="nav-link flex items-center gap-3 px-4 py-3 rounded-lg transition-colors
                      text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700">
                <i class="fa-solid fa-truck w-5 text-center"></i>
                <span data-i18n="purchase_orders">Purchase Orders</span>
            </a>

            <!-- CRM -->
            <a href="/customers.html"
               class="nav-link flex items-center gap-3 px-4 py-3 rounded-lg transition-colors
                      text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700">
                <i class="fa-solid fa-users w-5 text-center"></i>
                <span data-i18n="customers">Customers</span>
            </a>

            <!-- Reports -->
            <a href="/analytics.html"
               class="nav-link flex items-center gap-3 px-4 py-3 rounded-lg transition-colors
                      text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700">
                <i class="fa-solid fa-chart-line w-5 text-center"></i>
                <span data-i18n="reports">Reports</span>
            </a>

        </nav>

        <!-- Logout -->
        <div class="px-4 py-4 border-t border-gray-200 dark:border-gray-700">
            <button onclick="logout()"
                    class="w-full flex items-center gap-3 px-4 py-3 rounded-lg
                           text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 transition-colors">
                <i class="fa-solid fa-right-from-bracket w-5 text-center"></i>
                <span>Logout</span>
            </button>
        </div>

    </aside>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col">

        <!-- Header -->
        <header class="h-16 bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 flex items-center justify-between px-6">
            <h1 class="text-xl font-semibold" data-i18n="welcome_message">Welcome back</h1>
            <div class="flex items-center space-x-4">

                <!-- Theme Toggle -->
                <button id="theme-toggle" class="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">
                    <i class="fa-solid fa-moon dark:hidden"></i>
                    <i class="fa-solid fa-sun hidden dark:block text-yellow-400"></i>
                </button>

                <!-- Language Select -->
                <select id="lang-select" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg p-2 dark:bg-gray-700 dark:border-gray-600 dark:text-white">
                    <option value="en">🇺🇸 EN</option>
                    <option value="th">🇹🇭 TH</option>
                </select>

                <!-- User Badge -->
                <div id="user-badge" class="w-8 h-8 rounded-full bg-brand-500 text-white flex items-center justify-center font-bold text-sm">
                    A
                </div>

            </div>
        </header>

        <!-- Dashboard Content -->
        <main class="flex-1 p-6 overflow-y-auto">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">

                <div class="bg-white dark:bg-gray-800 p-6 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700">
                    <h3 class="text-gray-500 dark:text-gray-400 text-sm font-medium" data-i18n="daily_sales">Daily Sales</h3>
                    <p class="text-2xl font-bold mt-2">฿0.00</p>
                </div>

                <div class="bg-white dark:bg-gray-800 p-6 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700">
                    <h3 class="text-gray-500 dark:text-gray-400 text-sm font-medium" data-i18n="total_products">Total Products</h3>
                    <p id="stat-products" class="text-2xl font-bold mt-2">—</p>
                </div>

                <div class="bg-white dark:bg-gray-800 p-6 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700">
                    <h3 class="text-gray-500 dark:text-gray-400 text-sm font-medium" data-i18n="low_stock_alerts">Low Stock Alerts</h3>
                    <p id="stat-lowstock" class="text-2xl font-bold mt-2 text-red-500">—</p>
                </div>

            </div>
        </main>

    </div>

    <script src="/js/app.js"></script>
    <script>
        // Active nav highlight — ไฮไลต์เมนูตาม URL ปัจจุบัน
        const currentPage = window.location.pathname.split('/').pop() || 'index.html';
        document.querySelectorAll('.nav-link').forEach(link => {
            const linkPage = link.getAttribute('href').replace('/', '');
            if (linkPage === currentPage) {
                link.classList.remove('text-gray-600', 'dark:text-gray-400');
                link.classList.add('bg-brand-50', 'dark:bg-green-900/30', 'text-brand-500', 'font-medium');
            }
        });

        // แสดง username จาก localStorage
        const user = JSON.parse(localStorage.getItem('user') || '{}');
        if (user.username) {
            document.getElementById('user-badge').textContent = user.username[0].toUpperCase();
        }

        // Logout
        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '/login.html';
        }
    </script>

</body>
</html>
