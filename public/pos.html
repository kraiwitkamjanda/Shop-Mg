<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS — Garden Shop</title>
    <script src="/js/guard.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { brand: { 50: '#f0fdf4', 500: '#22c55e', 600: '#16a34a', 900: '#14532d' } } } }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .modal-backdrop { backdrop-filter: blur(4px); }
        .fade-in { animation: fadeIn 0.15s ease; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:translateY(0); } }
        .product-card { transition: transform 0.15s ease, box-shadow 0.15s ease; }
        .product-card:hover { transform: translateY(-2px); }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-gray-900 dark:text-gray-100 transition-colors duration-200 flex h-screen overflow-hidden">

    <!-- SIDEBAR -->
    <aside class="w-64 bg-white dark:bg-gray-800 border-r border-gray-200 dark:border-gray-700 flex flex-col hidden md:flex shrink-0">
        <div class="h-16 flex items-center px-6 border-b border-gray-200 dark:border-gray-700">
            <i class="fa-solid fa-leaf text-brand-500 text-xl mr-3"></i>
            <span class="font-bold text-lg">Garden Shop</span>
        </div>
        <nav class="flex-1 px-4 py-4 space-y-1 overflow-y-auto">
            <a href="/index.html"           class="nav-link flex items-center gap-3 px-4 py-3 rounded-lg transition-colors text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700"><i class="fa-solid fa-chart-pie w-5 text-center"></i><span data-i18n="dashboard">Dashboard</span></a>
            <a href="/pos.html"             class="nav-link flex items-center gap-3 px-4 py-3 rounded-lg transition-colors text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700"><i class="fa-solid fa-cash-register w-5 text-center"></i><span data-i18n="pos">POS</span></a>
            <a href="/products.html"        class="nav-link flex items-center gap-3 px-4 py-3 rounded-lg transition-colors text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700"><i class="fa-solid fa-box w-5 text-center"></i><span data-i18n="products">Products</span></a>
            <a href="/inventory.html"       class="nav-link flex items-center gap-3 px-4 py-3 rounded-lg transition-colors text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700"><i class="fa-solid fa-warehouse w-5 text-center"></i><span data-i18n="inventory">Inventory</span></a>
            <a href="/purchase-orders.html" class="nav-link flex items-center gap-3 px-4 py-3 rounded-lg transition-colors text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700"><i class="fa-solid fa-truck w-5 text-center"></i><span data-i18n="purchase_orders">Purchase Orders</span></a>
            <a href="/customers.html"       class="nav-link flex items-center gap-3 px-4 py-3 rounded-lg transition-colors text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700"><i class="fa-solid fa-users w-5 text-center"></i><span data-i18n="customers">Customers</span></a>
            <a href="/analytics.html"       class="nav-link flex items-center gap-3 px-4 py-3 rounded-lg transition-colors text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700"><i class="fa-solid fa-chart-line w-5 text-center"></i><span data-i18n="reports">Reports</span></a>
        </nav>
        <div class="px-4 py-4 border-t border-gray-200 dark:border-gray-700">
            <button onclick="logout()" class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 transition-colors">
                <i class="fa-solid fa-right-from-bracket w-5 text-center"></i><span>Logout</span>
            </button>
        </div>
    </aside>

    <!-- MAIN -->
    <div class="flex-1 flex flex-col overflow-hidden">
        <header class="h-16 bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 flex items-center justify-between px-6 shrink-0">
            <h1 class="text-xl font-semibold" data-i18n="pos">POS</h1>
            <div class="flex items-center gap-3">
                <button id="theme-toggle" class="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">
                    <i class="fa-solid fa-moon dark:hidden"></i>
                    <i class="fa-solid fa-sun hidden dark:block text-yellow-400"></i>
                </button>
                <select id="lang-select" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg p-2 dark:bg-gray-700 dark:border-gray-600 dark:text-white">
                    <option value="en">US EN</option>
                    <option value="th">TH TH</option>
                </select>
                <div id="user-badge" class="w-8 h-8 rounded-full bg-brand-500 text-white flex items-center justify-center font-bold text-sm">A</div>
            </div>
        </header>

        <div class="flex-1 flex overflow-hidden p-4 gap-4">

            <!-- LEFT: Product Grid -->
            <div class="flex-1 flex flex-col overflow-hidden">
                <div class="flex gap-3 mb-4">
                    <div class="relative flex-1">
                        <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
                        <input id="pos-search" type="text" placeholder="Search name or scan barcode..."
                               class="w-full pl-9 pr-4 py-2.5 rounded-lg border border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-800 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500">
                    </div>
                    <select id="pos-category" class="px-3 py-2.5 rounded-lg border border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-800 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500">
                        <option value="">All</option>
                    </select>
                </div>
                <div id="pos-product-grid" class="flex-1 overflow-y-auto grid grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-3 content-start">
                    <div class="col-span-full flex items-center justify-center py-16 text-gray-400">
                        <i class="fa-solid fa-spinner fa-spin text-2xl"></i>
                    </div>
                </div>
            </div>

            <!-- RIGHT: Cart -->
            <div class="w-80 xl:w-96 flex flex-col bg-white dark:bg-gray-800 rounded-xl border border-gray-100 dark:border-gray-700 shadow-sm shrink-0">
                <div class="px-4 py-3 border-b border-gray-100 dark:border-gray-700 flex items-center justify-between">
                    <span class="font-semibold">Cart</span>
                    <button onclick="clearCart()" class="text-xs text-red-400 hover:text-red-600 transition-colors">
                        <i class="fa-solid fa-trash mr-1"></i>Clear
                    </button>
                </div>
                <div id="cart-items" class="flex-1 overflow-y-auto p-3 space-y-2">
                    <div id="cart-empty" class="flex flex-col items-center justify-center h-full text-gray-300 dark:text-gray-600 py-8">
                        <i class="fa-solid fa-cart-shopping text-4xl mb-2"></i>
                        <p class="text-sm">Cart is empty</p>
                    </div>
                </div>
                <div class="p-4 border-t border-gray-100 dark:border-gray-700 space-y-2">
                    <div class="flex justify-between text-sm text-gray-500">
                        <span>Subtotal</span><span id="cart-subtotal">฿0.00</span>
                    </div>
                    <div class="flex justify-between text-sm text-gray-500">
                        <span>Discount</span>
                        <div class="flex items-center gap-1">
                            <span>฿</span>
                            <input id="discount-input" type="number" min="0" value="0"
                                   class="w-16 text-right border border-gray-200 dark:border-gray-600 rounded px-1 py-0.5 bg-gray-50 dark:bg-gray-700 text-sm focus:outline-none focus:ring-1 focus:ring-brand-500"
                                   oninput="updateTotals()">
                        </div>
                    </div>
                    <div class="flex justify-between font-bold text-lg border-t border-gray-100 dark:border-gray-700 pt-2">
                        <span>Total</span><span id="cart-total" class="text-brand-500">฿0.00</span>
                    </div>
                    <div class="grid grid-cols-3 gap-2 mt-2">
                        <button onclick="selectPayment('cash')" id="pay-cash"
                                class="payment-btn py-2 rounded-lg text-xs font-medium border-2 border-brand-500 bg-brand-50 text-brand-600 dark:bg-green-900/20 transition-colors">
                            <i class="fa-solid fa-money-bill-wave block mb-1"></i>Cash
                        </button>
                        <button onclick="selectPayment('transfer')" id="pay-transfer"
                                class="payment-btn py-2 rounded-lg text-xs font-medium border-2 border-gray-200 dark:border-gray-600 text-gray-500 hover:border-brand-500 transition-colors">
                            <i class="fa-solid fa-qrcode block mb-1"></i>Transfer
                        </button>
                        <button onclick="selectPayment('card')" id="pay-card"
                                class="payment-btn py-2 rounded-lg text-xs font-medium border-2 border-gray-200 dark:border-gray-600 text-gray-500 hover:border-brand-500 transition-colors">
                            <i class="fa-solid fa-credit-card block mb-1"></i>Card
                        </button>
                    </div>
                    <button onclick="openCheckoutModal()"
                            class="w-full py-3 bg-brand-500 hover:bg-brand-600 text-white font-bold rounded-xl transition-colors mt-1 flex items-center justify-center gap-2">
                        <i class="fa-solid fa-receipt"></i>Checkout
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- CHECKOUT MODAL -->
    <div id="checkout-modal" class="fixed inset-0 z-50 hidden modal-backdrop bg-black/50 flex items-center justify-center p-4">
        <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-2xl w-full max-w-md fade-in">
            <div class="flex items-center justify-between px-6 py-4 border-b border-gray-100 dark:border-gray-700">
                <h2 class="text-lg font-semibold">Confirm Checkout</h2>
                <button onclick="closeCheckoutModal()" class="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700">
                    <i class="fa-solid fa-xmark text-gray-500"></i>
                </button>
            </div>
            <div class="px-6 py-4 space-y-4">
                <div>
                    <label class="block text-xs font-medium text-gray-500 mb-1">Customer Name (optional)</label>
                    <input id="checkout-customer-name" type="text" placeholder="Walk-in customer"
                           class="w-full px-3 py-2 rounded-lg border border-gray-200 dark:border-gray-600 bg-gray-50 dark:bg-gray-700 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500">
                </div>
                <div class="bg-gray-50 dark:bg-gray-700/50 rounded-xl p-4 space-y-2 text-sm">
                    <div class="flex justify-between text-gray-500"><span>Items</span><span id="confirm-items">0</span></div>
                    <div class="flex justify-between text-gray-500"><span>Subtotal</span><span id="confirm-subtotal">฿0.00</span></div>
                    <div class="flex justify-between text-gray-500"><span>Discount</span><span id="confirm-discount">฿0.00</span></div>
                    <div class="flex justify-between font-bold text-base border-t border-gray-200 dark:border-gray-600 pt-2">
                        <span>Total</span><span id="confirm-total" class="text-brand-500">฿0.00</span>
                    </div>
                    <div class="flex justify-between text-gray-500"><span>Payment</span><span id="confirm-payment" class="capitalize font-medium">Cash</span></div>
                </div>
                <p id="checkout-error" class="hidden text-sm text-red-500 bg-red-50 dark:bg-red-900/20 px-3 py-2 rounded-lg"></p>
            </div>
            <div class="flex gap-3 px-6 py-4 border-t border-gray-100 dark:border-gray-700">
                <button onclick="closeCheckoutModal()" class="flex-1 py-2 rounded-lg border border-gray-200 dark:border-gray-600 text-sm hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors">Cancel</button>
                <button onclick="confirmCheckout()" id="confirm-btn"
                        class="flex-1 py-2 bg-brand-500 hover:bg-brand-600 text-white font-semibold rounded-lg text-sm transition-colors flex items-center justify-center gap-2">
                    <i id="confirm-spinner" class="fa-solid fa-spinner fa-spin hidden"></i>
                    <span id="confirm-label">Confirm Sale</span>
                </button>
            </div>
        </div>
    </div>

    <!-- RECEIPT MODAL -->
    <div id="receipt-modal" class="fixed inset-0 z-50 hidden modal-backdrop bg-black/50 flex items-center justify-center p-4">
        <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-2xl w-full max-w-sm fade-in">
            <div class="p-6 text-center space-y-4">
                <div class="w-14 h-14 rounded-full bg-green-100 dark:bg-green-900/30 flex items-center justify-center mx-auto">
                    <i class="fa-solid fa-check text-green-500 text-2xl"></i>
                </div>
                <h2 class="text-xl font-bold">Sale Complete!</h2>
                <div id="receipt-content" class="text-left bg-gray-50 dark:bg-gray-700/50 rounded-xl p-4 text-sm space-y-1 font-mono"></div>
                <div class="flex gap-3">
                    <button onclick="printReceipt()" class="flex-1 py-2 rounded-lg border border-gray-200 dark:border-gray-600 text-sm hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors">
                        <i class="fa-solid fa-print mr-1"></i>Print
                    </button>
                    <button onclick="closeReceiptAndReset()" class="flex-1 py-2 bg-brand-500 hover:bg-brand-600 text-white font-semibold rounded-lg text-sm transition-colors">
                        New Sale
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        var token = localStorage.getItem('token');
        var user  = JSON.parse(localStorage.getItem('user') || '{}');
        if (user.username) document.getElementById('user-badge').textContent = user.username[0].toUpperCase();

        const currentPage = window.location.pathname.split('/').pop() || 'index.html';
        document.querySelectorAll('.nav-link').forEach(link => {
            const linkPage = link.getAttribute('href').replace('/', '');
            if (linkPage === currentPage) {
                link.classList.remove('text-gray-600', 'dark:text-gray-400');
                link.classList.add('bg-brand-50', 'dark:bg-green-900/30', 'text-brand-500', 'font-medium');
            }
        });

        if (localStorage.getItem('color-theme') === 'dark' ||
            (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
        document.getElementById('theme-toggle').addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('color-theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
        });

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '/login.html';
        }

        let allProducts   = [];
        let cart          = [];
        let paymentMethod = 'cash';

        async function loadCategories() {
            try {
                const res  = await fetch('/api/categories', { headers: { Authorization: `Bearer ${token}` } });
                if (!res.ok) return;
                const cats = await res.json();
                const sel  = document.getElementById('pos-category');
                cats.forEach(c => sel.innerHTML += `<option value="${c.id}">${c.name_en}</option>`);
            } catch(e) { console.error(e); }
        }

        async function loadProducts() {
            const search = document.getElementById('pos-search').value;
            const catId  = document.getElementById('pos-category').value;
            let url = `/api/products?search=${encodeURIComponent(search)}`;
            if (catId) url += `&categoryId=${catId}`;
            try {
                const res = await fetch(url, { headers: { Authorization: `Bearer ${token}` } });
                if (!res.ok) return;
                allProducts = await res.json();
                renderGrid();
            } catch(e) { console.error(e); }
        }

        function renderGrid() {
            const grid = document.getElementById('pos-product-grid');
            if (allProducts.length === 0) {
                grid.innerHTML = `<div class="col-span-full text-center py-16 text-gray-400"><i class="fa-solid fa-box-open text-3xl mb-2 block"></i>No products found</div>`;
                return;
            }
            grid.innerHTML = allProducts.map(p => {
                const outOfStock = p.quantity <= 0;
                return `<div onclick="${outOfStock ? '' : `addToCart(${p.id})`}"
                     class="product-card bg-white dark:bg-gray-800 rounded-xl border border-gray-100 dark:border-gray-700 p-3 shadow-sm
                            ${outOfStock ? 'opacity-50 cursor-not-allowed' : 'cursor-pointer hover:shadow-md hover:border-brand-500'}">
                    <div class="w-full aspect-square bg-gray-100 dark:bg-gray-700 rounded-lg mb-2 flex items-center justify-center">
                        <i class="fa-solid fa-seedling text-2xl text-gray-300 dark:text-gray-500"></i>
                    </div>
                    <p class="text-xs text-gray-400 font-mono">${p.sku}</p>
                    <p class="font-medium text-sm leading-tight mt-0.5">${p.name_en}</p>
                    <p class="text-xs text-gray-400">${p.name_th}</p>
                    <div class="flex items-center justify-between mt-2">
                        <span class="font-bold text-brand-500">฿${Number(p.price).toLocaleString()}</span>
                        <span class="text-xs ${p.quantity <= p.alertThreshold ? 'text-red-400' : 'text-gray-400'}">
                            ${outOfStock ? 'Out' : `Stock: ${p.quantity}`}
                        </span>
                    </div>
                </div>`;
            }).join('');
        }

        function addToCart(productId) {
            const product  = allProducts.find(p => p.id === productId);
            if (!product) return;
            const existing = cart.find(i => i.id === productId);
            if (existing) {
                if (existing.quantity >= product.quantity) { alert(`Max stock: ${product.quantity}`); return; }
                existing.quantity++;
            } else {
                cart.push({ ...product, quantity: 1 });
            }
            renderCart();
        }

        function removeFromCart(productId) {
            cart = cart.filter(i => i.id !== productId);
            renderCart();
        }

        function changeQty(productId, delta) {
            const item    = cart.find(i => i.id === productId);
            const product = allProducts.find(p => p.id === productId);
            if (!item) return;
            item.quantity += delta;
            if (item.quantity <= 0) { removeFromCart(productId); return; }
            if (product && item.quantity > product.quantity) { item.quantity = product.quantity; alert(`Max stock: ${product.quantity}`); }
            renderCart();
        }

        function clearCart() {
            cart = [];
            document.getElementById('discount-input').value = 0;
            renderCart();
        }

        function renderCart() {
            const container = document.getElementById('cart-items');
            if (cart.length === 0) {
                container.innerHTML = `<div class="flex flex-col items-center justify-center h-full text-gray-300 dark:text-gray-600 py-8">
                    <i class="fa-solid fa-cart-shopping text-4xl mb-2"></i><p class="text-sm">Cart is empty</p></div>`;
                updateTotals();
                return;
            }
            container.innerHTML = cart.map(item => `
                <div class="flex items-center gap-2 bg-gray-50 dark:bg-gray-700/50 rounded-lg p-2">
                    <div class="flex-1 min-w-0">
                        <p class="text-sm font-medium truncate">${item.name_en}</p>
                        <p class="text-xs text-brand-500">฿${Number(item.price).toLocaleString()}</p>
                    </div>
                    <div class="flex items-center gap-1 shrink-0">
                        <button onclick="changeQty(${item.id},-1)" class="w-6 h-6 rounded-full bg-gray-200 dark:bg-gray-600 flex items-center justify-center hover:bg-gray-300 transition-colors">
                            <i class="fa-solid fa-minus text-xs"></i>
                        </button>
                        <span class="w-6 text-center text-sm font-medium">${item.quantity}</span>
                        <button onclick="changeQty(${item.id},1)" class="w-6 h-6 rounded-full bg-gray-200 dark:bg-gray-600 flex items-center justify-center hover:bg-gray-300 transition-colors">
                            <i class="fa-solid fa-plus text-xs"></i>
                        </button>
                        <button onclick="removeFromCart(${item.id})" class="w-6 h-6 rounded-full text-red-400 hover:bg-red-50 dark:hover:bg-red-900/20 flex items-center justify-center ml-1 transition-colors">
                            <i class="fa-solid fa-xmark text-xs"></i>
                        </button>
                    </div>
                </div>`).join('');
            updateTotals();
        }

        function updateTotals() {
            const subtotal = cart.reduce((s, i) => s + i.price * i.quantity, 0);
            const discount = parseFloat(document.getElementById('discount-input').value) || 0;
            const total    = Math.max(0, subtotal - discount);
            document.getElementById('cart-subtotal').textContent = `฿${subtotal.toLocaleString('en',{minimumFractionDigits:2})}`;
            document.getElementById('cart-total').textContent    = `฿${total.toLocaleString('en',{minimumFractionDigits:2})}`;
        }

        function selectPayment(method) {
            paymentMethod = method;
            document.querySelectorAll('.payment-btn').forEach(btn => {
                btn.classList.remove('border-brand-500','bg-brand-50','text-brand-600','dark:bg-green-900/20');
                btn.classList.add('border-gray-200','dark:border-gray-600','text-gray-500');
            });
            const active = document.getElementById(`pay-${method}`);
            active.classList.add('border-brand-500','bg-brand-50','text-brand-600','dark:bg-green-900/20');
            active.classList.remove('border-gray-200','dark:border-gray-600','text-gray-500');
        }

        function openCheckoutModal() {
            if (cart.length === 0) { alert('Cart is empty.'); return; }
            const subtotal = cart.reduce((s, i) => s + i.price * i.quantity, 0);
            const discount = parseFloat(document.getElementById('discount-input').value) || 0;
            const total    = Math.max(0, subtotal - discount);
            document.getElementById('confirm-items').textContent    = `${cart.length} item(s)`;
            document.getElementById('confirm-subtotal').textContent = `฿${subtotal.toLocaleString('en',{minimumFractionDigits:2})}`;
            document.getElementById('confirm-discount').textContent = `฿${discount.toLocaleString('en',{minimumFractionDigits:2})}`;
            document.getElementById('confirm-total').textContent    = `฿${total.toLocaleString('en',{minimumFractionDigits:2})}`;
            document.getElementById('confirm-payment').textContent  = paymentMethod.charAt(0).toUpperCase() + paymentMethod.slice(1);
            document.getElementById('checkout-error').classList.add('hidden');
            document.getElementById('checkout-customer-name').value = '';
            document.getElementById('checkout-modal').classList.remove('hidden');
        }

        function closeCheckoutModal() { document.getElementById('checkout-modal').classList.add('hidden'); }

        async function confirmCheckout() {
            const customerName = document.getElementById('checkout-customer-name').value.trim();
            const subtotal     = cart.reduce((s, i) => s + i.price * i.quantity, 0);
            const discount     = parseFloat(document.getElementById('discount-input').value) || 0;
            const finalAmount  = Math.max(0, subtotal - discount);

            document.getElementById('confirm-spinner').classList.remove('hidden');
            document.getElementById('confirm-btn').disabled = true;
            document.getElementById('confirm-label').textContent = 'Processing...';

            try {
                const res = await fetch('/api/sales/checkout', {
                    method:  'POST',
                    headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
                    body: JSON.stringify({
                        items:        cart.map(i => ({ id: i.id, quantity: i.quantity, price: i.price })),
                        customerName: customerName || null,
                        discount,
                        paymentMethod,
                        totalAmount:  subtotal,
                        finalAmount
                    })
                });
                const data = await res.json();
                if (!res.ok) {
                    document.getElementById('checkout-error').textContent = data.message;
                    document.getElementById('checkout-error').classList.remove('hidden');
                    return;
                }
                closeCheckoutModal();
                showReceipt(data.sale, cart, subtotal, discount, finalAmount);
                loadProducts();
            } catch(e) {
                document.getElementById('checkout-error').textContent = 'Network error. Please try again.';
                document.getElementById('checkout-error').classList.remove('hidden');
            } finally {
                document.getElementById('confirm-spinner').classList.add('hidden');
                document.getElementById('confirm-btn').disabled = false;
                document.getElementById('confirm-label').textContent = 'Confirm Sale';
            }
        }

        function showReceipt(sale, items, subtotal, discount, total) {
            const lines = items.map(i =>
                `${i.name_en.substring(0,16).padEnd(16)} x${i.quantity}  ฿${(i.price*i.quantity).toLocaleString('en',{minimumFractionDigits:2})}`
            ).join('\n');
            document.getElementById('receipt-content').innerHTML = `
                <div class="text-center mb-2 font-bold">Garden Shop</div>
                <div class="text-center text-xs text-gray-400 mb-3">${sale.invoiceNo}</div>
                <pre class="text-xs whitespace-pre-wrap">${lines}</pre>
                <div class="border-t border-dashed border-gray-300 dark:border-gray-600 my-2"></div>
                <div class="flex justify-between text-xs"><span>Subtotal</span><span>฿${subtotal.toLocaleString('en',{minimumFractionDigits:2})}</span></div>
                <div class="flex justify-between text-xs"><span>Discount</span><span>฿${discount.toLocaleString('en',{minimumFractionDigits:2})}</span></div>
                <div class="flex justify-between font-bold mt-1"><span>TOTAL</span><span>฿${total.toLocaleString('en',{minimumFractionDigits:2})}</span></div>
                <div class="text-center text-xs text-gray-400 mt-3">Payment: ${sale.paymentMethod.toUpperCase()}</div>
                <div class="text-center text-xs text-gray-400">${new Date().toLocaleString()}</div>`;
            document.getElementById('receipt-modal').classList.remove('hidden');
        }

        function printReceipt() { window.print(); }

        function closeReceiptAndReset() {
            document.getElementById('receipt-modal').classList.add('hidden');
            clearCart();
        }

        let searchTimer;
        document.getElementById('pos-search').addEventListener('input', () => {
            clearTimeout(searchTimer);
            searchTimer = setTimeout(loadProducts, 300);
        });
        document.getElementById('pos-category').addEventListener('change', loadProducts);
        document.getElementById('checkout-modal').addEventListener('click', function(e) { if (e.target===this) closeCheckoutModal(); });
        document.getElementById('receipt-modal').addEventListener('click',  function(e) { if (e.target===this) closeReceiptAndReset(); });

        loadCategories();
        loadProducts();
    </script>
    <script src="/js/app.js"></script>
</body>
</html>
