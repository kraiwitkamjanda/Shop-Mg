<div class="flex h-full gap-4">
    <!-- Left: Product Selection -->
    <div class="flex-1 flex flex-col bg-white dark:bg-gray-800 rounded-xl p-4 shadow-sm">
        <div class="mb-4 flex gap-2">
            <input type="text" id="pos-search" placeholder="Scan Barcode or Search Name..." 
                   class="flex-1 p-3 border rounded-lg dark:bg-gray-700 dark:border-gray-600">
        </div>
        <div id="pos-product-grid" class="grid grid-cols-2 lg:grid-cols-4 gap-4 overflow-y-auto">
            <!-- Product cards rendered here -->
        </div>
    </div>

    <!-- Right: Shopping Cart -->
    <div class="w-96 flex flex-col bg-white dark:bg-gray-800 rounded-xl shadow-lg border-l dark:border-gray-700">
        <div class="p-4 border-b dark:border-gray-700 font-bold text-lg" data-i18n="cart">Current Cart</div>
        <div id="cart-items" class="flex-1 overflow-y-auto p-4 space-y-3">
            <!-- Cart items rendered here -->
        </div>
        <div class="p-4 border-t dark:border-gray-700 space-y-2">
            <div class="flex justify-between text-sm">
                <span data-i18n="subtotal">Subtotal</span>
                <span id="cart-subtotal">฿0.00</span>
            </div>
            <div class="flex justify-between font-bold text-xl text-brand-500">
                <span data-i18n="total">Total</span>
                <span id="cart-total">฿0.00</span>
            </div>
            <button onclick="openCheckoutModal()" class="w-full bg-brand-500 text-white py-4 rounded-xl font-bold mt-4 hover:bg-brand-600 transition-all">
                CHECKOUT (F10)
            </button>
        </div>
    </div>
</div>
