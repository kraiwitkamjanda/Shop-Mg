<!DOCTYPE html>
<html lang="en" class="light">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Products</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            500: '#22c55e'
                        }
                    }
                }
            }
        }
    </script>

</head>

<body class="bg-gray-100 dark:bg-gray-900 p-6">


    <!-- HEADER -->
    <div class="flex justify-between items-center mb-6">

        <h2 class="text-2xl font-bold dark:text-white">
            Products
        </h2>

        <button
            onclick="openModal()"
            class="bg-brand-500 text-white px-4 py-2 rounded-lg">

            Add Product

        </button>

    </div>


    <!-- FILTERS -->
    <div class="bg-white dark:bg-gray-800 p-4 rounded-xl mb-6 flex gap-4">

        <input
            type="text"
            id="search"
            placeholder="Search SKU/Name..."
            class="border p-2 rounded w-full dark:bg-gray-700 dark:text-white">

        <select
            id="category-filter"
            class="border p-2 rounded dark:bg-gray-700 dark:text-white">

            <option value="">
                All Categories
            </option>

        </select>

    </div>


    <!-- PRODUCT TABLE -->
    <div class="overflow-x-auto bg-white dark:bg-gray-800 rounded-xl shadow">

        <table class="w-full text-left">

            <thead class="border-b dark:border-gray-700">

                <tr>

                    <th class="p-4">SKU</th>

                    <th class="p-4">Name</th>

                    <th class="p-4">Stock</th>

                    <th class="p-4">Price</th>

                    <th class="p-4">Actions</th>

                </tr>

            </thead>

            <tbody id="product-list">

                <!-- Dynamic rows -->

            </tbody>

        </table>

    </div>


    <!-- SCRIPTS -->
    <script src="/js/guard.js"></script>

    <script src="/js/products.js"></script>

</body>

</html>
