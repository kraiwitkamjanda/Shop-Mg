<!-- Inside public/products.html (Simplified structure) -->
<div class="flex justify-between items-center mb-6">
    <h2 class="text-2xl font-bold dark:text-white" data-i18n="products">Products</h2>
    <button onclick="openModal()" class="bg-brand-500 text-white px-4 py-2 rounded-lg">
        <i class="fa fa-plus mr-2"></i> <span data-i18n="add_product">Add Product</span>
    </button>
</div>

<!-- Filters -->
<div class="bg-white dark:bg-gray-800 p-4 rounded-xl mb-6 flex gap-4">
    <input type="text" id="search" placeholder="Search SKU/Name..." class="border p-2 rounded w-full dark:bg-gray-700">
    <select id="category-filter" class="border p-2 rounded dark:bg-gray-700">
        <option value="">All Categories</option>
    </select>
</div>

<!-- Product Table -->
<div class="overflow-x-auto bg-white dark:bg-gray-800 rounded-xl shadow">
    <table class="w-full text-left">
        <thead class="border-b dark:border-gray-700">
            <tr>
                <th class="p-4">SKU</th>
                <th class="p-4" data-i18n="name">Name</th>
                <th class="p-4" data-i18n="stock">Stock</th>
                <th class="p-4" data-i18n="price">Price</th>
                <th class="p-4">Actions</th>
            </tr>
        </thead>
        <tbody id="product-list">
            <!-- Dynamic rows -->
        </tbody>
    </table>
</div>
